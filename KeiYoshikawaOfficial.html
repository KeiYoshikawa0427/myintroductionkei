<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>𠮷川慧のホームページ</title>

  <script>
    if ("scrollRestoration" in history) {
      history.scrollRestoration = "manual";
    }
  </script>

  <style>
    @font-face {
      font-family: "Noto Sans CJK JP Web";
      font-style: normal;
      font-weight: 400;
      font-display: swap;
      src:
        local("Noto Sans CJK JP Regular"),
        local("NotoSansCJKjp-Regular"),
        url("https://cdn.jsdelivr.net/gh/notofonts/noto-cjk@main/Sans/OTF/Japanese/NotoSansCJKjp-Regular.otf") format("opentype");
    }

    @font-face {
      font-family: "Noto Sans CJK JP Web";
      font-style: normal;
      font-weight: 700;
      font-display: swap;
      src:
        local("Noto Sans CJK JP Bold"),
        local("NotoSansCJKjp-Bold"),
        url("https://cdn.jsdelivr.net/gh/notofonts/noto-cjk@main/Sans/OTF/Japanese/NotoSansCJKjp-Bold.otf") format("opentype");
    }

    @font-face {
      font-family: "Noto Sans CJK JP Web";
      font-style: normal;
      font-weight: 900;
      font-display: swap;
      src:
        local("Noto Sans CJK JP Black"),
        local("NotoSansCJKjp-Black"),
        url("https://cdn.jsdelivr.net/gh/notofonts/noto-cjk@main/Sans/OTF/Japanese/NotoSansCJKjp-Black.otf") format("opentype");
    }

    :root {
      --bg: #f5f5f7;
      --text: #1d1d1f;
      --subtext: #6e6e73;
      --card: rgba(255, 255, 255, 0.78);
      --border: rgba(0, 0, 0, 0.08);
      --accent: #0071e3;
      --dark: #111111;
      --shadow: 0 30px 90px rgba(0, 0, 0, 0.14);

      --font-jp:
        "Noto Sans CJK JP Web",
        "Noto Sans CJK JP",
        "Source Han Sans JP",
        "Noto Sans JP",
        "Hiragino Sans",
        "Yu Gothic",
        "YuGothic",
        "Meiryo",
        sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
      overflow-x: hidden;
    }

    body {
      margin: 0;
      width: 100%;
      min-width: 0;
      font-family: var(--font-jp);
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(0, 113, 227, 0.16), transparent 30%),
        radial-gradient(circle at top right, rgba(180, 180, 255, 0.18), transparent 30%),
        var(--bg);
      line-height: 1.7;
      overflow-x: hidden;
      text-rendering: optimizeLegibility;
      -webkit-font-smoothing: antialiased;
    }

    .site-frame {
      width: 100%;
      max-width: 100%;
      min-width: 0;
      overflow-x: clip;
      transition:
        max-width 0.35s ease,
        box-shadow 0.35s ease,
        border-radius 0.35s ease;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(22px);
      background: rgba(245, 245, 247, 0.74);
      border-bottom: 1px solid var(--border);
    }

    .nav {
      width: min(1120px, calc(100% - 40px));
      min-height: 56px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      font-size: 14px;
    }

    .logo {
      font-weight: 700;
      letter-spacing: -0.03em;
      color: var(--text);
      white-space: nowrap;
    }

    .nav-right {
      display: flex;
      align-items: center;
      gap: 20px;
      flex-wrap: wrap;
      justify-content: flex-end;
      min-width: 0;
    }

    .nav-links {
      display: flex;
      gap: 22px;
      flex-wrap: wrap;
      justify-content: flex-end;
      min-width: 0;
    }

    .nav a {
      color: var(--subtext);
      text-decoration: none;
      transition: color 0.2s ease;
      white-space: nowrap;
    }

    .nav a:hover {
      color: var(--text);
    }

    .view-switch {
      display: flex;
      gap: 4px;
      padding: 4px;
      border-radius: 999px;
      background: rgba(0, 0, 0, 0.06);
      border: 1px solid var(--border);
      white-space: nowrap;
      max-width: 100%;
    }

    .view-button {
      border: none;
      padding: 6px 12px;
      border-radius: 999px;
      background: transparent;
      color: var(--subtext);
      font: inherit;
      font-size: 12px;
      cursor: pointer;
      transition: background 0.2s ease, color 0.2s ease;
      white-space: nowrap;
    }

    .view-button.active {
      background: #ffffff;
      color: var(--text);
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.10);
    }

    .hero {
      min-height: calc(100svh - 56px);
      display: grid;
      place-items: center;
      text-align: center;
      padding: 80px 20px 100px;
      position: relative;
      overflow: hidden;
    }

    .hero-inner {
      width: min(980px, 100%);
      max-width: 100%;
      min-width: 0;
    }

    .eyebrow {
      margin-bottom: 12px;
      color: var(--accent);
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    .hero-title {
      margin: 0;
      font-size: clamp(40px, 7.2vw, 92px);
      line-height: 1.08;
      letter-spacing: -0.055em;
      font-weight: 900;
      word-break: keep-all;
      line-break: strict;
      overflow-wrap: normal;
    }

    .hero-title-line {
      display: block;
    }

    .lead {
      max-width: 720px;
      margin: 28px auto 0;
      color: var(--subtext);
      font-size: clamp(20px, 2.5vw, 30px);
      letter-spacing: -0.04em;
      word-break: keep-all;
      line-break: strict;
      overflow-wrap: normal;
      text-wrap: balance;
    }

    .hero-actions {
      margin-top: 38px;
      display: flex;
      justify-content: center;
      gap: 14px;
      flex-wrap: wrap;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 44px;
      padding: 0 22px;
      border-radius: 999px;
      text-decoration: none;
      font-size: 16px;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      white-space: nowrap;
    }

    .button.primary {
      color: #ffffff;
      background: var(--accent);
      box-shadow: 0 12px 30px rgba(0, 113, 227, 0.24);
    }

    .button.secondary {
      color: var(--accent);
      background: rgba(0, 113, 227, 0.08);
    }

    .button:hover {
      transform: translateY(-2px);
    }

    .orb {
      position: absolute;
      width: 360px;
      height: 360px;
      border-radius: 50%;
      background: linear-gradient(135deg, rgba(0, 113, 227, 0.22), rgba(255, 255, 255, 0.42));
      filter: blur(2px);
      opacity: 0.76;
      z-index: -1;
      pointer-events: none;
    }

    .orb.one {
      left: -130px;
      bottom: 12%;
    }

    .orb.two {
      right: -150px;
      top: 12%;
    }

    main {
      width: min(1120px, calc(100% - 40px));
      max-width: 100%;
      margin: 0 auto;
      min-width: 0;
    }

    .push-section {
      min-height: 82vh;
      display: grid;
      align-items: center;
      padding: 80px 0;
      min-width: 0;
    }

    .push-card {
      position: relative;
      overflow: hidden;
      min-width: 0;
      padding: clamp(34px, 6vw, 72px);
      border-radius: 42px;
      background: var(--card);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      backdrop-filter: blur(26px);
    }

    .push-card.dark {
      color: #ffffff;
      background:
        radial-gradient(circle at top right, rgba(0, 113, 227, 0.35), transparent 34%),
        #111111;
    }

    .intro-card {
      background:
        radial-gradient(circle at top left, rgba(0, 113, 227, 0.18), transparent 36%),
        radial-gradient(circle at bottom right, rgba(160, 160, 255, 0.22), transparent 40%),
        rgba(255, 255, 255, 0.82);
    }

    .intro-main {
      font-size: clamp(30px, 4.8vw, 60px);
      line-height: 1.26;
      letter-spacing: -0.04em;
    }

    .intro-profile {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
      margin-top: 34px;
    }

    .intro-mini-card {
      padding: 18px 18px;
      border-radius: 22px;
      background: rgba(255, 255, 255, 0.62);
      border: 1px solid rgba(0, 0, 0, 0.07);
      box-shadow: 0 12px 34px rgba(0, 0, 0, 0.08);
    }

    .intro-mini-label {
      margin: 0;
      color: var(--subtext);
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.06em;
    }

    .intro-mini-text {
      margin: 8px 0 0;
      color: var(--text);
      font-size: 17px;
      font-weight: 800;
      line-height: 1.45;
      letter-spacing: -0.025em;
    }

    .section-label {
      display: block;
      margin-bottom: 16px;
      color: var(--accent);
      font-size: 15px;
      font-weight: 800;
      letter-spacing: 0.08em;
      white-space: nowrap;
    }

    .section-title {
      margin: 0;
      color: var(--subtext);
      font-size: clamp(20px, 2.4vw, 30px);
      line-height: 1.3;
      letter-spacing: -0.04em;
      font-weight: 700;
      word-break: keep-all;
      line-break: strict;
    }

    .section-main {
      max-width: 920px;
      margin: 26px 0 0;
      color: var(--text);
      font-size: clamp(28px, 4.7vw, 60px);
      line-height: 1.24;
      letter-spacing: -0.04em;
      font-weight: 900;
      word-break: keep-all;
      line-break: strict;
      overflow-wrap: normal;
      text-wrap: balance;
    }

    .research-main {
      font-size: clamp(26px, 4.1vw, 52px);
      line-height: 1.30;
      letter-spacing: -0.032em;
    }

    .main-line {
      display: block;
      max-width: 100%;
    }

    .section-sub {
      max-width: 780px;
      margin: 24px 0 0;
      color: var(--subtext);
      font-size: clamp(17px, 1.8vw, 23px);
      line-height: 1.65;
      letter-spacing: -0.025em;
      font-weight: 600;
      word-break: keep-all;
      line-break: strict;
      overflow-wrap: normal;
      text-wrap: pretty;
    }

    .push-card.dark .section-label {
      color: rgba(255, 255, 255, 0.72);
    }

    .push-card.dark .section-title {
      color: rgba(255, 255, 255, 0.64);
    }

    .push-card.dark .section-main {
      color: rgba(255, 255, 255, 0.95);
    }

    .push-card.dark .section-sub {
      color: rgba(255, 255, 255, 0.68);
    }

    .big-word {
      position: absolute;
      right: -0.06em;
      bottom: -0.28em;
      font-size: clamp(110px, 20vw, 250px);
      line-height: 1;
      font-weight: 900;
      letter-spacing: -0.09em;
      color: rgba(0, 0, 0, 0.045);
      pointer-events: none;
      user-select: none;
      z-index: 0;
    }

    .push-card > *:not(.big-word) {
      position: relative;
      z-index: 1;
    }

    .push-card.dark .big-word {
      color: rgba(255, 255, 255, 0.08);
    }

    .contact-card {
      margin: 60px 0 100px;
      padding: clamp(32px, 5vw, 56px);
      border-radius: 36px;
      background: var(--dark);
      color: #ffffff;
      box-shadow: var(--shadow);
      position: relative;
      overflow: hidden;
      min-width: 0;
    }

    .contact-card .section-label {
      color: rgba(255, 255, 255, 0.72);
    }

    .contact-card .section-title {
      color: rgba(255, 255, 255, 0.64);
    }

    .mail {
      margin-top: 24px;
      font-size: clamp(24px, 4.2vw, 54px);
      font-weight: 900;
      line-height: 1.18;
      letter-spacing: -0.04em;
      color: rgba(255, 255, 255, 0.95);
      word-break: break-word;
      overflow-wrap: anywhere;
    }

    .contact-card p {
      margin: 22px 0 0;
      color: rgba(255, 255, 255, 0.68);
      font-size: clamp(16px, 1.8vw, 21px);
      font-weight: 600;
      word-break: keep-all;
      line-break: strict;
    }

    footer {
      width: min(1120px, calc(100% - 40px));
      margin: 0 auto;
      padding: 34px 0 48px;
      border-top: 1px solid var(--border);
      color: var(--subtext);
      font-size: 13px;
    }

    .reveal {
      opacity: 0;
      transition:
        opacity 0.9s ease,
        transform 0.9s cubic-bezier(0.16, 1, 0.3, 1),
        filter 0.9s ease;
      will-change: opacity, transform, filter;
    }

    .reveal.show {
      opacity: 1;
      transform: translate(0, 0) scale(1) rotate(0deg);
      filter: blur(0);
    }

    .rise-soft {
      transform: translateY(32px) scale(0.98);
      filter: blur(10px);
    }

    .rise-basic,
    .rise-left,
    .rise-right,
    .rise-zoom,
    .rise-rotate,
    .rise-dynamic {
      transform: translateY(48px);
      filter: blur(3px);
    }

    .delay-1 { transition-delay: 0.04s; }
    .delay-2 { transition-delay: 0.08s; }
    .delay-3 { transition-delay: 0.12s; }
    .delay-4 { transition-delay: 0.16s; }
    .delay-5 { transition-delay: 0.20s; }

    @media (min-width: 861px) {
      .rise-left {
        transform: translate(-52px, 54px);
      }

      .rise-right {
        transform: translate(52px, 54px);
      }

      .rise-zoom {
        transform: translateY(64px) scale(0.92);
        filter: blur(8px);
      }

      .rise-rotate {
        transform: translateY(58px) rotate(-2.8deg);
      }

      .rise-dynamic {
        transform: translateY(86px) scale(0.90);
        filter: blur(8px);
      }
    }

    @media (max-width: 860px) {
      .nav {
        width: calc(100% - 28px);
        height: auto;
        min-height: 56px;
        padding: 12px 0;
        align-items: flex
