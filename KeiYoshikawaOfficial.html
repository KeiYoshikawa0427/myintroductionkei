<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>のホームページ</title>

  <style>
    :root {
      --bg: #f5f5f7;
      --text: #1d1d1f;
      --subtext: #6e6e73;
      --card: rgba(255, 255, 255, 0.72);
      --border: rgba(0, 0, 0, 0.08);
      --accent: #0071e3;
      --shadow: 0 30px 80px rgba(0, 0, 0, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      font-family:
        -apple-system,
        BlinkMacSystemFont,
        "Helvetica Neue",
        "Hiragino Sans",
        "Yu Gothic",
        sans-serif;
      background:
        radial-gradient(circle at top left, rgba(0, 113, 227, 0.16), transparent 32%),
        radial-gradient(circle at top right, rgba(160, 160, 255, 0.18), transparent 30%),
        var(--bg);
      color: var(--text);
      line-height: 1.7;
      overflow-x: hidden;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 10;
      backdrop-filter: blur(20px);
      background: rgba(245, 245, 247, 0.72);
      border-bottom: 1px solid var(--border);
    }

    .nav {
      width: min(1080px, calc(100% - 40px));
      margin: 0 auto;
      height: 52px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 14px;
    }

    .logo {
      font-weight: 700;
      letter-spacing: -0.03em;
    }

    .nav a {
      color: var(--subtext);
      text-decoration: none;
      margin-left: 24px;
      transition: color 0.2s ease;
    }

    .nav a:hover {
      color: var(--text);
    }

    .hero {
      min-height: calc(100vh - 52px);
      display: grid;
      place-items: center;
      text-align: center;
      padding: 80px 20px 100px;
      position: relative;
    }

    .hero-inner {
      width: min(980px, 100%);
    }

    .eyebrow {
      font-size: 18px;
      color: var(--accent);
      font-weight: 700;
      letter-spacing: 0.02em;
      margin-bottom: 12px;
    }

    h1 {
      margin: 0;
      font-size: clamp(48px, 9vw, 112px);
      line-height: 0.95;
      letter-spacing: -0.075em;
      font-weight: 800;
    }

    .lead {
      margin: 28px auto 0;
      max-width: 680px;
      font-size: clamp(19px, 2.4vw, 28px);
      color: var(--subtext);
      letter-spacing: -0.03em;
    }

    .hero-actions {
      margin-top: 36px;
      display: flex;
      gap: 14px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 44px;
      padding: 0 22px;
      border-radius: 999px;
      font-size: 16px;
      text-decoration: none;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .button.primary {
      color: white;
      background: var(--accent);
      box-shadow: 0 12px 30px rgba(0, 113, 227, 0.24);
    }

    .button.secondary {
      color: var(--accent);
      background: rgba(0, 113, 227, 0.08);
    }

    .button:hover {
      transform: translateY(-2px);
    }

    .orb {
      position: absolute;
      width: 340px;
      height: 340px;
      border-radius: 50%;
      background: linear-gradient(135deg, rgba(0, 113, 227, 0.24), rgba(255, 255, 255, 0.4));
      filter: blur(2px);
      opacity: 0.75;
      z-index: -1;
      animation: float 8s ease-in-out infinite;
    }

    .orb.one {
      left: -120px;
      bottom: 10%;
    }

    .orb.two {
      right: -140px;
      top: 14%;
      animation-delay: -3s;
    }

    @keyframes float {
      0%, 100% {
        transform: translateY(0) scale(1);
      }
      50% {
        transform: translateY(-24px) scale(1.05);
      }
    }

    main {
      width: min(1080px, calc(100% - 40px));
      margin: 0 auto;
      padding-bottom: 96px;
    }

    .section-title {
      margin: 0 0 28px;
      font-size: clamp(34px, 5vw, 64px);
      line-height: 1.05;
      letter-spacing: -0.06em;
    }

    .profile-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 18px;
    }

    .card {
      min-height: 220px;
      padding: 28px;
      border-radius: 32px;
      background: var(--card);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      backdrop-filter: blur(24px);
      transition: transform 0.28s ease, box-shadow 0.28s ease;
    }

    .card:hover {
      transform: translateY(-6px);
      box-shadow: 0 40px 100px rgba(0, 0, 0, 0.16);
    }

    .card.large {
      grid-column: span 2;
    }

    .label {
      display: block;
      margin-bottom: 10px;
      font-size: 14px;
      color: var(--subtext);
      font-weight: 700;
      letter-spacing: 0.06em;
    }

    .value {
      margin: 0;
      font-size: clamp(22px, 3vw, 34px);
      line-height: 1.25;
      letter-spacing: -0.04em;
      font-weight: 750;
    }

    .small-value {
      margin: 0;
      color: var(--subtext);
      font-size: 17px;
    }

    .contact {
      margin-top: 18px;
      padding: 22px 24px;
      border-radius: 24px;
      background: #111;
      color: white;
      display: flex;
      justify-content: space-between;
      gap: 20px;
      align-items: center;
      flex-wrap: wrap;
    }

    .contact p {
      margin: 0;
      color: rgba(255, 255, 255, 0.72);
    }

    .mail {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    footer {
      width: min(1080px, calc(100% - 40px));
      margin: 0 auto;
      padding: 32px 0 48px;
      color: var(--subtext);
      font-size: 13px;
      border-top: 1px solid var(--border);
    }

    .reveal {
      opacity: 0;
      transform: translateY(28px);
      transition: opacity 0.8s ease, transform 0.8s ease;
    }

    .reveal.show {
      opacity: 1;
      transform: translateY(0);
    }

    @media (max-width: 780px) {
      .nav a {
        margin-left: 14px;
      }

      .profile-grid {
        grid-template-columns: 1fr;
      }

      .card.large {
        grid-column: span 1;
      }

      .card {
        min-height: 180px;
        border-radius: 26px;
      }

      .hero {
        padding-top: 64px;
      }
    }
  </style>
</head>

<body>
  <header>
    <nav class="nav">
      <div class="logo">のホームページ</div>
      <div>
        <a href="#about">About</a>
        <a href="#profile">Profile</a>
        <a href="#contact">Contact</a>
      </div>
    </nav>
  </header>

  <section class="hero">
    <div class="orb one"></div>
    <div class="orb two"></div>

    <div class="hero-inner reveal">
      <div class="eyebrow">Personal Website</div>
      <h1>のホームページ</h1>
      <p class="lead">おはこんばんにちは。のホームページへようこそ。</p>

      <div class="hero-actions">
        <a class="button primary" href="#profile">プロフィールを見る</a>
        <a class="button secondary" href="#contact">連絡先を見る</a>
      </div>
    </div>
  </section>

  <main>
    <section id="about" class="reveal">
      <h2 class="section-title">シンプルに、印象的に。</h2>
    </section>

    <section id="profile" class="profile-grid">
      <article class="card large reveal">
        <span class="label">所属</span>
        <p class="value">所属：</p>
      </article>

      <article class="card reveal">
        <span class="label">研究</span>
        <p class="value">研究：</p>
      </article>

      <article class="card reveal">
        <span class="label">趣味</span>
        <p class="value">散歩、ゲーム、ピアノ</p>
      </article>

      <article class="card reveal">
        <span class="label">好きなめん</span>
        <p class="value">ラーメン</p>
      </article>

      <article class="card reveal">
        <span class="label">嫌いなめん</span>
        <p class="value">アーメン</p>
      </article>
    </section>

    <section id="contact" class="contact reveal">
      <div>
        <span class="label">連絡先</span>
        <div class="mail"> | -at- </div>
      </div>
      <p>「-at-」を「@」に変えてください。</p>
    </section>
  </main>

  <footer>
    © のホームページ
  </footer>

  <script>
    const targets = document.querySelectorAll(".reveal");

    const observer = new IntersectionObserver((entries) => {
      entries.forEach((entry) => {
        if (entry.isIntersecting) {
          entry.target.classList.add("show");
        }
      });
    }, {
      threshold: 0.16
    });

    targets.forEach((target) => observer.observe(target));
  </script>
</body>
</html>
